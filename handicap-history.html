    <style>
      .hc-page { max-width: 1100px; margin: 2em auto; padding: 0 0.5rem; }
      .hc-player-picker { margin-bottom: 1.5em; }
      .hc-player-picker label { display: block; margin-bottom: 0.35em; font-weight: 600; }
      .hc-player-picker select { width: 100%; max-width: 420px; padding: 0.5em; font-size: 1em; }
      .hc-timeline-table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
      .hc-timeline-table th, .hc-timeline-table td { padding: 0.5em 0.6em; border-bottom: 1px solid #e8e8e8; text-align: left; }
      .hc-timeline-table th { color: #169179; font-weight: 600; border-bottom: 2px solid #169179; }
      .hc-timeline-table th.hc-col-pos,
      .hc-timeline-table td.hc-col-pos { width: 1%; white-space: nowrap; text-align: center; }
      .hc-empty { color: #666; }
      .loading { text-align: center; color: #666; padding: 1em; }
    </style>
